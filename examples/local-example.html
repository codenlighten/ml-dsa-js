<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ML-DSA + ECDSA Dual-Stack Demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        background: #0b1020;
        color: #e7ecff;
      }
      .wrap {
        max-width: 980px;
        margin: 2rem auto;
        padding: 1.25rem;
      }
      .card {
        background: #121a33;
        border: 1px solid #263154;
        border-radius: 14px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      h1 {
        margin-top: 0;
        font-size: 1.4rem;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.8rem;
      }
      @media (max-width: 850px) {
        .grid { grid-template-columns: 1fr; }
      }
      label {
        display: block;
        margin: 0.5rem 0 0.25rem;
        font-weight: 600;
      }
      input, select, textarea, button {
        width: 100%;
        border: 1px solid #364471;
        border-radius: 10px;
        background: #0f1730;
        color: #e7ecff;
        padding: 0.7rem;
        box-sizing: border-box;
      }
      textarea {
        min-height: 105px;
        resize: vertical;
      }
      button {
        margin-top: 0.75rem;
        cursor: pointer;
        font-weight: 700;
      }
      .ok { color: #7ee787; font-weight: 700; }
      .bad { color: #ff7b72; font-weight: 700; }
      .hint { opacity: 0.8; font-size: 0.9rem; }
      code { color: #9ecbff; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Local dual-stack demo (PQ + ECDSA)</h1>
        <p class="hint">
          Uses your local bundle: <code>../dist/mldsa.min.js</code>.
          Swap to <code>../dist/mldsa.js</code> for non-minified debugging.
        </p>
      </div>

      <div class="card">
        <div class="grid">
          <div>
            <label for="chain">ECDSA Chain</label>
            <select id="chain">
              <option value="ethereum" selected>Ethereum (EIP-55)</option>
              <option value="bitcoin">Bitcoin</option>
              <option value="bsv">BSV</option>
            </select>
          </div>
          <div>
            <label for="addressFormat">Bitcoin Address Format</label>
            <select id="addressFormat">
              <option value="p2pkh" selected>P2PKH (legacy)</option>
              <option value="p2wpkh">P2WPKH (bech32)</option>
            </select>
          </div>
        </div>

        <label for="level">ML-DSA Security Level</label>
        <select id="level">
          <option value="44">ML-DSA-44</option>
          <option value="65" selected>ML-DSA-65</option>
          <option value="87">ML-DSA-87</option>
        </select>

        <label for="mnemonic">24-word BIP39 mnemonic</label>
        <textarea id="mnemonic">abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon art</textarea>

        <label for="message">Message</label>
        <textarea id="message">quantum-safe migration starts now</textarea>

        <button id="run">Derive Keys + Sign + Verify</button>
      </div>

      <div class="card">
        <div id="result"></div>

        <label for="ecdsaAddress">ECDSA Address</label>
        <textarea id="ecdsaAddress" readonly></textarea>

        <label for="wif">WIF (from ECDSA private key)</label>
        <textarea id="wif" readonly></textarea>

        <label for="pqPub">PQ Public Key (Base64)</label>
        <textarea id="pqPub" readonly></textarea>

        <label for="pqSig">PQ Signature (Base64)</label>
        <textarea id="pqSig" readonly></textarea>
      </div>
    </div>

    <script src="../dist/mldsa.min.js"></script>
    <!-- For readable bundle during debugging, use: <script src="../dist/mldsa.js"></script> -->
    <script>
      const result = document.getElementById('result');
      const chainEl = document.getElementById('chain');
      const addressFormatEl = document.getElementById('addressFormat');
      const levelEl = document.getElementById('level');
      const mnemonicEl = document.getElementById('mnemonic');
      const messageEl = document.getElementById('message');
      const ecdsaAddressEl = document.getElementById('ecdsaAddress');
      const wifEl = document.getElementById('wif');
      const pqPubEl = document.getElementById('pqPub');
      const pqSigEl = document.getElementById('pqSig');
      const runBtn = document.getElementById('run');

      function syncAddressFormatAvailability() {
        addressFormatEl.disabled = chainEl.value !== 'bitcoin';
      }

      chainEl.addEventListener('change', syncAddressFormatAvailability);
      syncAddressFormatAvailability();

      runBtn.addEventListener('click', () => {
        try {
          const chain = chainEl.value;
          const addressFormat = addressFormatEl.value;
          const level = Number(levelEl.value);
          const mnemonic = mnemonicEl.value.trim();
          const message = messageEl.value;

          const ecdsa = MLDSA.ecdsaKeygenFromMnemonic({
            mnemonic,
            chain,
            ...(chain === 'bitcoin' ? { addressFormat } : {}),
          });
          const pq = MLDSA.keygenFromMnemonic({ mnemonic, level });

          const pqSigned = MLDSA.sign(message, pq.secretKey, { level });
          const pqValid = MLDSA.verify(pqSigned.signature, message, pq.publicKey, { level });

          const ecdsaSigned = MLDSA.ecdsaSign(message, ecdsa.privateKey, {
            hash: chain === 'ethereum' ? 'keccak256' : 'sha256',
          });
          const ecdsaValid = MLDSA.ecdsaVerify(
            ecdsaSigned.signatureCompact,
            message,
            ecdsa.publicKeyCompressed,
            { hash: chain === 'ethereum' ? 'keccak256' : 'sha256' }
          );

          const wif = MLDSA.ecdsaPrivateKeyToWif(ecdsa.privateKey);
          const parsed = MLDSA.ecdsaPrivateKeyFromWif(wif);

          ecdsaAddressEl.value = [
            `address: ${ecdsa.address}`,
            ecdsa.addressP2PKH ? `p2pkh: ${ecdsa.addressP2PKH}` : '',
            ecdsa.addressBech32 ? `bech32: ${ecdsa.addressBech32}` : '',
          ].filter(Boolean).join('\n');

          wifEl.value = `${wif}\n\nparsed.compressed: ${parsed.compressed}`;
          pqPubEl.value = pq.publicKeyBase64;
          pqSigEl.value = pqSigned.signatureBase64;

          const ok = pqValid && ecdsaValid;
          result.innerHTML = ok
            ? '<p class="ok">✅ PQ and ECDSA signatures verified. Dual-stack ready.</p>'
            : '<p class="bad">❌ Verification failed for one or both signature types.</p>';
        } catch (error) {
          result.innerHTML = `<p class="bad">Error: ${error?.message || error}</p>`;
        }
      });
    </script>
  </body>
</html>
